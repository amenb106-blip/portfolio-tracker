<!DOCTYPE html>
<html>
<head>
  <title>Portfolio Dashboard</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <svg class="logo" width="18" height="18" viewBox="0 0 20 20" fill="none" aria-hidden="true">
        <path d="M3 15l5-6 3.5 3L17 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M12.5 5H17v4.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Portfolio Dashboard
    </div>
    <div class="topbar-actions">
      <button class="btn-ghost btn-icon" id="theme-toggle" onclick="toggleTheme()" aria-label="Toggle light/dark theme" title="Toggle theme">
        <svg class="icon-sun" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
        </svg>
        <svg class="icon-moon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
      <button class="btn-ghost" id="refresh" onclick="refresh()">
        <svg class="icon-refresh" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
        <span id="refresh-label">Refresh</span>
      </button>
    </div>
  </header>

  <main class="container">
    <div id="banner" class="banner" hidden></div>

    <section class="topgrid">
      <section class="hero">
        <div class="hero-label">Total Portfolio Value</div>
        <div class="total" id="total">$0.00</div>
        <div class="hero-stats" id="hero-stats">
          <span class="stat"><span class="stat-label">Total Gain</span><span class="stat-value stat-empty">—</span></span>
          <span class="stat"><span class="stat-label">Daily Gain</span><span class="stat-value stat-empty">—</span></span>
        </div>
      </section>

      <section class="chart-panel">
        <div class="panel-label">Allocation</div>
        <div class="chart-area">
          <div class="chart-wrap"><canvas id="chart"></canvas></div>
          <div class="chart-legend" id="chart-legend"></div>
        </div>
      </section>
    </section>

    <div class="card holdings-card">
      <div class="card-head">
        <h2 class="card-title">Holdings</h2>
        <div class="form">
          <input id="ticker" placeholder="Ticker">
          <input id="shares" placeholder="Shares" type="number">
          <input id="buy_price" placeholder="Buy Price" type="number">
          <button class="btn-primary" onclick="addStock()">Add</button>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Ticker</th>
              <th class="num">Shares</th>
              <th class="num">Price</th>
              <th class="num">Value</th>
              <th class="num">Total Gain</th>
              <th class="num">Daily Gain</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
        <div class="empty" id="empty">No holdings yet. Add one above to get started.</div>
      </div>
    </div>

    <div class="card watchlist-card">
      <div class="card-head">
        <h2 class="card-title">Watchlist</h2>
        <div class="form">
          <input id="watch-ticker" placeholder="Ticker">
          <button class="btn-primary" onclick="addWatch()">Add</button>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Ticker</th>
              <th class="num">Price</th>
              <th class="num">Day</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="watchlist-body"></tbody>
        </table>
        <div class="empty" id="watchlist-empty">No tickers watched yet.</div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
